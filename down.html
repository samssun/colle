<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>session expired page design</title>
    <style>
body {
	background-color: #f2f2f2;
	font-family: Arial, sans-serif;
}

.container-session {
	background-color: #fff;
	border: 1px solid #ccc;
	border-radius: 5px;
	box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
	margin: 50px auto;
	max-width: 500px;
	padding: 30px;
	text-align: center;
}

.session-title {
	font-size: 36px;
	margin-bottom: 20px;
}

.session-details {
	font-size: 18px;
	margin-bottom: 30px;
}

.session-button {
	background-color: #4CAF50;
	border: none;
	border-radius: 5px;
	color: #fff;
	cursor: pointer;
	font-size: 18px;
	padding: 10px 20px;
	text-decoration: none;
	transition: background-color 0.3s ease;
}

.session-button:hover {
	background-color: #3e8e41;
}
</style>

  </head>
    
  <body>
  <div class="container-session">
		<h1 class="session-title">Session Expired</h1>
		<p class="session-details">Your session has expired. Please log in again.</p>
		<a href="index.html" class="btn session-button">Back to home</a>
	</div>
    
  </body>
  
</html>

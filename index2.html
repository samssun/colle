<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout </title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #d0c2f7f2 0%, #a7a7f6 100%);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background particles */
    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(102, 126, 234, 0.5);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-20px) rotate(180deg);
      }
    }

    .checkout-container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(102, 126, 234, 0.15);
      padding: 45px 35px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      position: relative;
      z-index: 2;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .checkout-header {
      text-align: center;
      margin-bottom: 35px;
    }

    .checkout-title {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #59199a, #eb87f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.3));
      }

      to {
        filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.6));
      }
    }

    .checkout-subtitle {
      color: #504e4e;
      font-size: 1.1rem;
      margin-bottom: 0;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin: 25px 0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
      width: 33%;
      transition: width 0.5s ease;
    }

    .checkout-summary {
      background: #aaaaaa42;
      border-radius: 18px;
      padding: 25px;
      margin-bottom: 35px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      position: relative;
      overflow: hidden;
    }

    .checkout-summary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% {
        left: -100%;
      }

      100% {
        left: 100%;
      }
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .summary-row:last-child {
      margin-bottom: 0;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 1.2rem;
      font-weight: 700;
    }

    .summary-label {
      color: #7c7a7a;
      font-size: 1rem;
    }

    .summary-value {
      color: #464444e8;
      font-weight: 600;
    }

    .total-value {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 1.3rem;
    }

    .payment-methods {
      margin-bottom: 30px;
    }

    .payment-method-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #292828d1;
    }

    .payment-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    .payment-tab {
      flex: 1;
      padding: 12px 20px;
      background: rgb(45 44 44 / 76%);
      border: 1px solid rgb(248 245 245 / 10%);
      border-radius: 12px;
      color: #f8f7f7;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      font-weight: 500;
    }

    .payment-tab.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: 1px solid rgba(102, 126, 234, 0.5);
      transform: translateY(-2px);
    }

    .payment-tab:hover:not(.active) {
      background: rgb(129 125 125 / 51%);
      transform: translateY(-1px);
    }

    .saved-cards {
      margin-bottom: 25px;
    }

    .saved-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .saved-card:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .saved-card.selected {
      border: 2px solid #667eea;
      background: rgba(102, 126, 234, 0.15);
    }

    .card-icon {
      font-size: 1.5rem;
      color: #667eea;
    }

    .card-info {
      flex: 1;
    }

    .card-number {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-type {
      color: #aaa;
      font-size: 0.9rem;
    }

    .add-new-card {
      background: rgba(255, 255, 255, 0.04);
      border: 2px dashed rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      padding: 18px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #aaa;
      font-weight: 500;
    }

    .add-new-card:hover {
      border-color: #667eea;
      color: #667eea;
      background: rgba(102, 126, 234, 0.05);
    }

    .checkout-form {
      display: none;
    }

    .checkout-form.active {
      display: block;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #636060;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgb(129 122 122 / 18%);
      color: #343232;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .form-group input:focus {
      border: 2px solid #667eea;
      outline: none;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-row {
      display: flex;
      gap: 15px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .security-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #34d399;
      font-size: 0.9rem;
      margin-top: 15px;
    }

    .checkout-btn {
      width: 100%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 16px;
      color: #fff;
      padding: 18px 0;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s;
      margin-top: 25px;
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.2);
      position: relative;
      overflow: hidden;
    }

    .checkout-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
    }

    .checkout-btn:active {
      transform: translateY(0);
    }

    .checkout-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    .checkout-btn:hover::before {
      left: 100%;
    }

    .checkout-success {
      background: rgba(52, 211, 153, 0.15);
      color: #34d399;
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 16px;
      padding: 25px;
      margin-top: 25px;
      text-align: center;
      font-weight: 600;
      font-size: 1.2rem;
      animation: successPulse 0.6s ease-out;
    }

    @keyframes successPulse {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }

      50% {
        transform: scale(1.05);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .loading .checkout-btn {
      background: #555;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 600px) {
      .checkout-container {
        padding: 25px 20px;
        margin: 10px;
      }

      .checkout-title {
        font-size: 2rem;
      }

      .form-row {
        flex-direction: column;
        gap: 0;
      }

      .payment-tabs {
        flex-direction: column;
      }
    }
  </style>
</head>

   <script>  
const name = document.getElementById('name');
const number = document.getElementById('number');
const date = document.getElementById('date');
const cvv = document.getElementById('cvv');

function showError(element, error) {
    if(error === true) {
        element.style.opacity = '1';
    } else {
        element.style.opacity = '0';
    }
};

number.addEventListener('input', function(e) {
    this.value = numberAutoFormat();


    let error = this.value.length !== 19;
    let alert2 = document.getElementById('alert-2');
    showError(alert2, error);

    document.querySelector('.card__number').textContent = this.value;
});

function numberAutoFormat() {
    let valueNumber = number.value;
   
    let v = valueNumber.replace(/\s+/g, '').replace(/[^0-9]/gi, '');

    
    let matches = v.match(/\d{4,16}/g);
    let match = matches && matches[0] || '';
    let parts = [];

    for (i = 0; i < match.length; i += 4) {
        
        parts.push(match.substring(i, i + 4));
    }

    if (parts.length) {
       
        return parts.join(' ');
    } else {
        return valueNumber;
    }
};

date.addEventListener('input', function(e) {
    this.value = dateAutoFormat();
    
  
    let alert3 = document.getElementById('alert-3');
    showError(alert3, isNotDate(this));

    let dateNumber = date.value.match(/\d{2,4}/g);
    document.getElementById('month').textContent = dateNumber[0];
    document.getElementById('year').textContent = dateNumber[1];
});

function isNotDate(element) {
    let actualDate = new Date();
    let month = actualDate.getMonth() + 0;
    let year = Number(actualDate.getFullYear().toString().substr(-2)); // 2022 -> 22
    let dateNumber = element.value.match(/\d{2,4}/g);
    let monthNumber = Number(dateNumber[0]);
    let yearNumber = Number(dateNumber[1]);
    
    if(element.value === '' || monthNumber < 1 || monthNumber > 12 || yearNumber < year || (monthNumber <= month && yearNumber === year)) {
        return true;
    } else {
        return false;
    }
}

function dateAutoFormat() {
    let dateValue = date.value;
   
    let v = dateValue.replace(/\s+/g, '').replace(/[^0-9]/gi, '');


    let matches = v.match(/\d{2,4}/g);
    let match = matches && matches[0] || '';
    let parts = [];

    for (i = 0; i < match.length; i += 2) {
    
        parts.push(match.substring(i, i + 2));
    }

    if (parts.length) {
       
        return parts.join('/');
    } else {
        return dateValue;
    }
};

cvv.addEventListener('input', function(e) {
    let alert4 = document.getElementById('alert-4');
    let error = this.value.length < 3;
    showError(alert4, error)
});

function isNumeric(event) {
    if ((event.keyCode < 48 || event.keyCode > 57) && (event.keyCode > 31)) {
        return false;
    }
};

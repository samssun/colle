<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>mobile-view (Payment-Method)</title>
    <style>
body{
    background: white;
    font-family: Montserrat;
}

.container,.main-container,.mobile-view,.mobile-view-2,.top-boxes-container,.top-boxes,.input-fields,.input-fields-2,.icon-images-2-row{
    display: flex;
}

.button,input,.top-boxes,select,.icon-images-2,.icon-images-2-master-card{
    box-shadow: .2px .2px 3px .2px rgb(172, 172, 172);
}

.container,.top-boxes-container,.input-fields-2,.icon-images-2-row{
    flex-direction: row;
}

.mobile-view-2,.top-boxes,h3,select,.payment-details-heading{
    color:black;
}

.mobile-view,.mobile-view-2{
    width:20.8rem;
    padding:0px 17px 0px 22px;
    height:43.2rem;
    box-shadow: .2px .2px 5px .2px gray;
}

.mobile-view,.top-boxes,.input-fields,.mobile-view-2{
    align-items: center;
    flex-direction: column;
}

.mobile-view,.top-boxes:active,.button{
    color:white;
}

select,.cvv,input{
    outline: none;
    border:none;
}

.main-container{
    gap:40px;
    justify-content: center;
}

.input-fields{
    margin: -30px 0px 0px -10px;
    gap:25px;
}

.input-fields-2{
    gap:36px;
    margin:0px 0px 0px -12px;
}

.container{
    gap:30px;
    padding-top: 25px;
    justify-content: center;
}

.mobile-view{
    background:linear-gradient(to left,rgb(243, 243, 243),rgb(255, 255, 255));
}

.mobile-view-2{
    justify-content: center;
    background:linear-gradient(to left,rgb(243, 243, 243),rgb(255, 255, 255));
}

.top-boxes{
    width:5.5rem;
    height: 6.3rem;
    background: white;
    padding:2px 5px 2px 7px;
    border-radius:6px;
}

.top-boxes:active{
    transition: .3s;
    background: linear-gradient(to left,rgb(4, 4, 78),rgb(43, 2, 93));
}

.top-boxes-container{
    gap:20px;
}

.icon-images,.icon-images-2,.icon-images-2-master-card,.icon-images-3{    
    height: auto;
}


.icon-images{
    padding: 10px 0px 2px 3px;
    width:3rem;
}


.icon-images-2-row{
    gap:20px;
    margin-left: 7px;
}

.icon-images-2,.icon-images-2-master-card{
    margin:0px 0px 0px -7px;
    padding: 1px 18px 2px 18px;
    width:2.5rem;
    border-radius:200px;
}

.icon-images-2-master-card{
    padding:0px 3px 1px 3px;
    width: 4.6rem;
    margin: -1px 0px 0px 0px;
}

.icon-images-3{
    padding: 10px 10px 12px 13px;
    margin: 8px 0px 0px 0px;
    border-radius: 200px;
    background: linear-gradient(to left,rgb(2, 82, 99),rgb(59, 38, 216));
    box-shadow: .2px .2px 6px .2px rgb(193, 191, 191);
    width:3rem;
}

p{
    font-family: 'Roboto';
    letter-spacing: .5px;
    font-size: 14px;
    text-align: center;
}

h2,h3,.payment-details-heading,input::placeholder{
    letter-spacing:2.5px;
}

h2{
    padding:0px 0px 0px 10px;
    font-size: 15px;
}

input{
    border-radius: 2px;
    width:88%;
    padding: 10px;
}


select{
    margin-left: -20px;
    border-radius:5px;
    outline:none;
    border: 1px solid transparent;
    font-size: 16px;
    background: linear-gradient(to left,rgb(255, 255, 255),rgb(255, 255, 255));
    padding:6px 6px 6px 10px;
}



input::placeholder{
    padding-left:3px; 
    font-family: Verdana, Geneva, Tahoma, sans-serif;
}

.cvv{
    width: 39px;
    margin-left: -20px;
}

.button{
    margin-top: -4px;
    background: linear-gradient(to left,rgb(81, 81, 250),rgb(13, 171, 206));
    padding:8px 28px 8px 28px;
    text-decoration: none;
}

.button:hover{
  transition:.4s;
  background: linear-gradient(to left,rgb(57, 57, 247),rgb(0, 141, 172));
  box-shadow:.2px .2px 4px .2px rgb(0, 136, 255);
}

.payment-details-heading{
    font-size: 17px;
}
</style>
